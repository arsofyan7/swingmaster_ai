<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - SwingMaster AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a;
            color: #f3f4f6;
        }
        .banner {
            background: linear-gradient(to right, #ef4444, #f59e0b);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card h2 {
            margin-top: 0;
            font-size: 16px;
            color: #9ca3af;
            text-transform: uppercase;
        }
        .card .value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0 0;
        }
        .text-green { color: #34d399; }
        .text-blue { color: #60a5fa; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            background-color: rgba(31, 41, 55, 0.5);
            color: #9ca3af;
            font-size: 14px;
        }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="banner">⚠️ Anda Sedang Offline | Menampilkan Snapshot Terakhir</div>
    
    <div class="container">
        <h1 style="text-align:center; margin-bottom: 30px;">SwingMaster AI</h1>
        
        <div id="snapshot-content" style="display:none;">
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div class="card" style="flex:1; min-width: 250px;">
                    <h2>Total Equity</h2>
                    <div class="value" id="off-equity">Rp 0</div>
                </div>
                <div class="card" style="flex:1; min-width: 250px;">
                    <h2>Cash Available</h2>
                    <div class="value text-green" id="off-cash">Rp 0</div>
                </div>
            </div>

            <div class="card">
                <h2>Active Positions</h2>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Avg Price</th>
                                <th>Last Price</th>
                                <th>Floating P/L</th>
                            </tr>
                        </thead>
                        <tbody id="off-positions">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="no-snapshot" class="text-center" style="margin-top:50px; display:none;">
            <div style="font-size:48px; margin-bottom:20px;">📡</div>
            <h2>Tidak Ada Data Tersimpan</h2>
            <p style="color:#9ca3af;">Silakan hubungkan kembali ke internet untuk memuat data.</p>
        </div>
    </div>

    <script>
        function formatRupiah(angka) {
            return "Rp " + angka.toLocaleString('id-ID');
        }

        window.onload = () => {
            const snapshot = localStorage.getItem("last_dashboard_snapshot");
            if (snapshot) {
                try {
                    const data = JSON.parse(snapshot);
                    document.getElementById("snapshot-content").style.display = "block";
                    
                    const balanceInfo = data.balance_info || {};
                    document.getElementById("off-equity").textContent = formatRupiah(balanceInfo.total_equity || 0);
                    document.getElementById("off-cash").textContent = formatRupiah(balanceInfo.current_balance || 0);
                    
                    const tbody = document.getElementById("off-positions");
                    const positions = data.active_positions || [];
                    if (positions.length > 0) {
                        positions.forEach(pos => {
                            const pnlClass = pos.floating_pnl >= 0 ? "text-green" : "text-red";
                            const invest = pos.buy_price * pos.total_lot * 100;
                            const pnlPct = invest > 0 ? ((pos.floating_pnl / invest) * 100).toFixed(2) : 0;
                            tbody.innerHTML += `
                                <tr>
                                    <td style="font-weight:bold;">${pos.ticker}</td>
                                    <td>${pos.buy_price}</td>
                                    <td>${pos.current_price || '-'}</td>
                                    <td class="${pnlClass}">${formatRupiah(pos.floating_pnl)} (${pnlPct}%)</td>
                                </tr>
                            `;
                        });
                    } else {
                        tbody.innerHTML = `<tr><td colspan="4" class="text-center" style="color:#9ca3af;">Tidak ada posisi aktif</td></tr>`;
                    }
                } catch (e) {
                    console.error("Error parsing snapshot", e);
                    document.getElementById("no-snapshot").style.display = "block";
                }
            } else {
                document.getElementById("no-snapshot").style.display = "block";
            }
        };
    </script>
</body>
</html>
