version: '3.8'

services:
  swingmaster:
    build: .
    container_name: swingmaster_backend
    restart: unless-stopped
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./market_data.db:/app/market_data.db
      - ./screener_cache.db:/app/screener_cache.db
      - ./stock_data.db:/app/stock_data.db
      - ./data.db:/app/data.db
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swingmaster.rule=Host(`misc4.siberhub.id`)"
      - "traefik.http.routers.swingmaster.entrypoints=websecure"
      - "traefik.http.routers.swingmaster.tls.certresolver=myresolver"
      - "traefik.http.services.swingmaster.loadbalancer.server.port=8000"
      - "traefik.docker.network=web"

networks:
  web:
    external: true
